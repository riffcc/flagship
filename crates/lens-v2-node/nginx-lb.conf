upstream lens_backend {
    server lens-v2-node-0:5000;
    server lens-v2-node-1:5000;
    server lens-v2-node-2:5000;
}

upstream flagship_frontend {
    server flagship-node-0:80;
    server flagship-node-1:80;
    server flagship-node-2:80;
}

server {
    listen 80;
    listen 8080;

    # API requests go to Rust backend
    location /api/ {
        proxy_pass http://lens_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else goes to frontend
    location / {
        proxy_pass http://flagship_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Example Nginx Configuration for Lens Node v2 Upload System
# This configuration provides a reverse proxy to the lens-node API
# with proper upload handling and authentication

# Upstream backend servers
upstream lens_node_backend {
    # Single instance
    server localhost:5002;

    # For load balancing across multiple instances:
    # server 10.7.1.100:5002;
    # server 10.7.1.101:5002;
    # server 10.7.1.102:5002;

    # Keep connections alive for better performance
    keepalive 32;
}

# HTTP server (redirects to HTTPS in production)
server {
    listen 80;
    server_name lens.example.com;

    # For production, redirect to HTTPS:
    # return 301 https://$server_name$request_uri;

    # For development/testing, proxy directly:
    location / {
        proxy_pass http://lens_node_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forward real client IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward authentication header (public key)
        proxy_set_header X-Public-Key $http_x_public_key;
    }

    # Special handling for upload endpoint with larger limits
    location /api/v1/upload {
        # Increase upload size limits
        client_max_body_size 500M;
        client_body_buffer_size 10M;

        # Increase timeouts for large file uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable request buffering to stream uploads
        proxy_request_buffering off;

        proxy_pass http://lens_node_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forward real client IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward authentication header (REQUIRED)
        proxy_set_header X-Public-Key $http_x_public_key;
    }

    # Admin endpoints (optional: add IP whitelist or additional auth)
    location /api/v1/admin {
        # Optional: restrict to internal network
        # allow 10.7.1.0/24;
        # deny all;

        proxy_pass http://lens_node_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Public-Key $http_x_public_key;
    }

    # WebSocket endpoint for P2P relay
    location /api/v1/relay/ws {
        proxy_pass http://lens_node_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}

# HTTPS server (production)
server {
    listen 443 ssl http2;
    server_name lens.example.com;

    # SSL certificates (use Let's Encrypt or your own certs)
    ssl_certificate /etc/ssl/certs/lens.example.com.crt;
    ssl_certificate_key /etc/ssl/private/lens.example.com.key;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers (adjust as needed)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,X-Public-Key" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;

    # Handle preflight requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    location / {
        proxy_pass http://lens_node_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forward real client IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward authentication header (public key)
        proxy_set_header X-Public-Key $http_x_public_key;
    }

    # Special handling for upload endpoint with larger limits
    location /api/v1/upload {
        # Increase upload size limits
        client_max_body_size 500M;
        client_body_buffer_size 10M;

        # Increase timeouts for large file uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable request buffering to stream uploads
        proxy_request_buffering off;

        proxy_pass http://lens_node_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forward real client IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward authentication header (REQUIRED)
        proxy_set_header X-Public-Key $http_x_public_key;
    }

    # Admin endpoints (optional: add IP whitelist or additional auth)
    location /api/v1/admin {
        # Optional: restrict to internal network
        # allow 10.7.1.0/24;
        # deny all;

        proxy_pass http://lens_node_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Public-Key $http_x_public_key;
    }

    # WebSocket endpoint for P2P relay
    location /api/v1/relay/ws {
        proxy_pass http://lens_node_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}

# Installation instructions:
# 1. Copy this file to /etc/nginx/sites-available/lens-node
# 2. Edit server_name and SSL certificate paths
# 3. Create symlink: ln -s /etc/nginx/sites-available/lens-node /etc/nginx/sites-enabled/
# 4. Test config: nginx -t
# 5. Reload nginx: systemctl reload nginx

# Example curl commands for testing:
#
# Upload a file (with uploader role):
# curl -X POST http://lens.example.com/api/v1/upload \
#   -H "X-Public-Key: YOUR_PUBLIC_KEY_HERE" \
#   -F "file=@/path/to/file.jpg" \
#   -F 'metadata={"description":"Test upload"}'
#
# List pending uploads (admin/moderator only):
# curl -X GET http://lens.example.com/api/v1/admin/uploads/pending \
#   -H "X-Public-Key: YOUR_ADMIN_KEY"
#
# Approve an upload (admin/moderator only):
# curl -X POST http://lens.example.com/api/v1/admin/uploads/UPLOAD_ID/approve \
#   -H "X-Public-Key: YOUR_ADMIN_KEY"
#
# Grant uploader role (admin only):
# curl -X POST http://lens.example.com/api/v1/admin/roles/uploader \
#   -H "Content-Type: application/json" \
#   -d '{"publicKey": "USER_PUBLIC_KEY"}'

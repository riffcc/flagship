    ports:
      - "10.7.1.200:5002:80"
    volumes:
      - ./anycast-nginx-41.conf:/etc/nginx/nginx.conf:ro
    networks:
      lens-network:
        ipv4_address: 172.20.0.2
    restart: unless-stopped


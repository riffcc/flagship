      - LENS_CLUSTER_SIZE=41
      - LENS_ANYCAST_IP=172.20.0.2
      - PORT=5002
      - RUST_LOG=info
    volumes:
      - lens-data-0:/data
    networks:
      - lens-network
    restart: unless-stopped
    depends_on:

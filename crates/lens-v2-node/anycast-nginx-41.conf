events {
    worker_connections 1024;
}

http {
    upstream lens_cluster {
        least_conn;
        server lens-node-0:5002;
        server lens-node-1:5002;
        server lens-node-2:5002;
        server lens-node-3:5002;
        server lens-node-4:5002;
        server lens-node-5:5002;
        server lens-node-6:5002;
        server lens-node-7:5002;
        server lens-node-8:5002;
        server lens-node-9:5002;
        server lens-node-10:5002;
        server lens-node-11:5002;
        server lens-node-12:5002;
        server lens-node-13:5002;
        server lens-node-14:5002;
        server lens-node-15:5002;
        server lens-node-16:5002;
        server lens-node-17:5002;
        server lens-node-18:5002;
        server lens-node-19:5002;
        server lens-node-20:5002;
        server lens-node-21:5002;
        server lens-node-22:5002;
        server lens-node-23:5002;
        server lens-node-24:5002;
        server lens-node-25:5002;
        server lens-node-26:5002;
        server lens-node-27:5002;
        server lens-node-28:5002;
        server lens-node-29:5002;
        server lens-node-30:5002;
        server lens-node-31:5002;
        server lens-node-32:5002;
        server lens-node-33:5002;
        server lens-node-34:5002;
        server lens-node-35:5002;
        server lens-node-36:5002;
        server lens-node-37:5002;
        server lens-node-38:5002;
        server lens-node-39:5002;
        server lens-node-40:5002;
    }

    server {
        listen 80;

        location /api/v1/relay/ws {
            proxy_pass http://lens_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass http://lens_cluster;
            proxy_set_header Host $host;
        }
    }
}

# Backend for WebSocket relay (Rust lens-v2-node) - 3 BOOTSTRAP RELAY NODES
# Routes to 3 stable bootstrap relays for peer discovery (simulates anycast regions)
backend lens_backend_ws
    balance roundrobin
    option httpchk GET /api/v1/ready
    http-check expect status 200
    timeout tunnel 3600s
    timeout server 3600s
    timeout client 3600s

    # Enable WebSocket protocol upgrade
    http-request set-header X-Forwarded-For %[src]
    http-request add-header X-Forwarded-Proto https if { ssl_fc }

    # Only 3 bootstrap relay nodes
    server lens-v2-node-0 lens-v2-node-0:5000 check inter 5s
    server lens-v2-node-1 lens-v2-node-1:5000 check inter 5s
    server lens-v2-node-2 lens-v2-node-2:5000 check inter 5s

# Backend for flagship frontend (Node.js/nginx) - Not part of 50-node test
backend flagship_frontend
    balance roundrobin
    option httpchk GET /
    http-check expect status 200

    server flagship-node-0 flagship-node-0:80 check inter 5s
    server flagship-node-1 flagship-node-1:80 check inter 5s
    server flagship-node-2 flagship-node-2:80 check inter 5s


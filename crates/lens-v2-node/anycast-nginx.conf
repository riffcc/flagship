# Nginx config for anycast proxy (local dev)
# In production, use real anycast (BGP)

events {
    worker_connections 1024;
}

http {
    # Upstream pool of all lens nodes
    upstream lens_cluster {
        least_conn;  # Route to least-connected node

        # All 41 nodes (in production, auto-discovered via PeerDex)
        server lens-node-0:5002;
        server lens-node-1:5002;
        server lens-node-2:5002;
        # ... nodes 3-40 ...
    }

    server {
        listen 80;

        # WebSocket support for relay
        location /api/v1/relay/ws {
            proxy_pass http://lens_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Long timeout for WebSocket
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Regular HTTP API
        location / {
            proxy_pass http://lens_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

# Docker Compose for local 41-node testing
# Production uses Kubernetes + anycast

version: '3.8'

services:
  # HAProxy Load Balancer for lens nodes
  haproxy:
    image: haproxy:2.3
    container_name: lens-haproxy
    ports:
      - "14005:80"        # API traffic
      - "14006:8404"      # Stats page
    volumes:
      - ./haproxy-backend.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - lens-network

  # Generate 41 lens nodes
  lens-node-0:
    image: lens-v2-node:latest
    privileged: true
    environment:
      - LENS_NODE_ID=0
      - LENS_CLUSTER_ID=lens-cluster-local
      - LENS_ANYCAST_IP=172.20.0.2
      - PORT=5002
    volumes:
      - lens-data-0:/data
    networks:
      - lens-network

  lens-node-1:
    image: lens-v2-node:latest
    privileged: true
    environment:
      - LENS_NODE_ID=1
      - LENS_CLUSTER_ID=lens-cluster-local
      - LENS_ANYCAST_IP=172.20.0.2
      - PORT=5002
    volumes:
      - lens-data-1:/data
    networks:
      - lens-network

  lens-node-2:
    image: lens-v2-node:latest
    privileged: true
    environment:
      - LENS_NODE_ID=2
      - LENS_CLUSTER_ID=lens-cluster-local
      - LENS_ANYCAST_IP=172.20.0.2
      - PORT=5002
    volumes:
      - lens-data-2:/data
    networks:
      - lens-network

  # TODO: Add nodes 3-40 (generated via script or Kubernetes)

volumes:
  lens-data-0:
  lens-data-1:
  lens-data-2:

networks:
  lens-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

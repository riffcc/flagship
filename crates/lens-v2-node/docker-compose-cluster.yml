    - lens-v2-node-47
    - lens-v2-node-48
    - lens-v2-node-49
    - flagship-node-0
    - flagship-node-1
    - flagship-node-2
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8404/stats
      interval: 10s
      timeout: 5s
      retries: 3
  lens-v2-node-0:
    image: zorlin/lens-v2:v0.8.39
    container_name: lens-v2-node-0
    environment:
    - RUST_LOG=info
    - PORT=5000
    - LENS_NODE_ID=0
    - LENS_CLUSTER_ID=production-cluster-50
    - RELAY_URL=wss://relay.global.riff.cc/api/v1/relay/ws
    - DB_PATH=/data/rocksdb
    - SYNC_MODE=ubts
    - ADMIN_PUBLIC_KEY=ed25519p/6efebf50da89a1ba94e0bf56c0728470dd80373149553223da0ce4d8076e9d86,ed25519p/be3dcdf9d0a31a1e45703145f9991ea01b12c0d79633f7e1fc7fe10b66e56473
    volumes:
    - lens-v2-node-0-data:/data
    networks:
    - lens-network
    privileged: true
    healthcheck:
      test:
      - CMD
      - curl
      - -f

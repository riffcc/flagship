services:
  # HAProxy Load Balancer
  haproxy:
    image: haproxy:3.1-trixie
    container_name: lens-haproxy
    entrypoint: ["/usr/local/sbin/haproxy"]
    command: ["-f", "/usr/local/etc/haproxy/haproxy.cfg", "-db"]
    ports:
      - "8080:80"        # Main traffic (frontend + API)
      - "5175:80"        # Flagship frontend (alternate port)
      - "14005:8404"     # Stats page on custom port
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - lens-network
    depends_on:
      - lens-v2-node-0
      - lens-v2-node-1
      - lens-v2-node-2
      - flagship-node-0
      - flagship-node-1
      - flagship-node-2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8404/stats"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ========================================
  # LENS V2 NODES (Rust Backend - 3 nodes)
  # ========================================

  # Lens v2 Node 0 (acts as primary relay)
  lens-v2-node-0:
    image: lens-v2-node:latest
    pull_policy: never
    container_name: lens-v2-node-0
    environment:
      - RUST_LOG=info
      - PORT=5000
      - LENS_NODE_ID=0
      - LENS_CLUSTER_ID=production-cluster
      - LENS_RELAY_URL=ws://localhost:5000/api/v1/relay/ws
      - DB_PATH=/data/rocksdb
      - SYNC_MODE=ubts
      - ADMIN_PUBLIC_KEY=ed25119p/661f20293170ac54c64abcca6c24c4c773245e469904f200b8b633d1c4a5888b
    volumes:
      - lens-v2-node-0-data:/data
    networks:
      - lens-network
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 3

  # Lens v2 Node 1
  lens-v2-node-1:
    image: lens-v2-node:latest
    container_name: lens-v2-node-1
    environment:
      - RUST_LOG=info
      - PORT=5000
      - LENS_NODE_ID=1
      - LENS_CLUSTER_ID=production-cluster
      - LENS_RELAY_URL=ws://lens-v2-node-0:5000/api/v1/relay/ws
      - DB_PATH=/data/rocksdb
      - SYNC_MODE=ubts
      - ADMIN_PUBLIC_KEY=ed25119p/661f20293170ac54c64abcca6c24c4c773245e469904f200b8b633d1c4a5888b
    volumes:
      - lens-v2-node-1-data:/data
    networks:
      - lens-network
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 3

  # Lens v2 Node 2
  lens-v2-node-2:
    image: lens-v2-node:latest
    container_name: lens-v2-node-2
    environment:
      - RUST_LOG=info
      - PORT=5000
      - LENS_NODE_ID=2
      - LENS_CLUSTER_ID=production-cluster
      - LENS_RELAY_URL=ws://lens-v2-node-0:5000/api/v1/relay/ws
      - DB_PATH=/data/rocksdb
      - SYNC_MODE=ubts
      - ADMIN_PUBLIC_KEY=ed25119p/661f20293170ac54c64abcca6c24c4c773245e469904f200b8b633d1c4a5888b
    volumes:
      - lens-v2-node-2-data:/data
    networks:
      - lens-network
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 3

  # ========================================
  # FLAGSHIP NODES (Node.js Frontend - 3 nodes)
  # ========================================

  # Flagship Node 0
  flagship-node-0:
    build:
      context: ../..  # flagship directory
      dockerfile: docker/Dockerfile.prebuilt
      args:
        - VITE_API_URL=https://api.palace.riff.cc/api/v1
    container_name: flagship-node-0
    environment:
      - NODE_ENV=production
      - API_URL=http://haproxy:80/api
    ports:
      - "15075:80"  # Direct access for debugging
    networks:
      - lens-network
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Flagship Node 1
  flagship-node-1:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.prebuilt
      args:
        - VITE_API_URL=https://api.palace.riff.cc/api/v1
    container_name: flagship-node-1
    environment:
      - NODE_ENV=production
      - API_URL=http://haproxy:80/api
    networks:
      - lens-network
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Flagship Node 2
  flagship-node-2:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.prebuilt
      args:
        - VITE_API_URL=https://api.palace.riff.cc/api/v1
    container_name: flagship-node-2
    environment:
      - NODE_ENV=production
      - API_URL=http://haproxy:80/api
    networks:
      - lens-network
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

networks:
  lens-network:
    driver: bridge

volumes:
  lens-v2-node-0-data:
  lens-v2-node-1-data:
  lens-v2-node-2-data:

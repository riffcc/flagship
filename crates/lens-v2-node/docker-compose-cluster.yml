services:
  haproxy:
    image: haproxy:2.3
    container_name: lens-haproxy
    entrypoint:
    - /usr/local/sbin/haproxy
    command:
    - -f
    - /usr/local/etc/haproxy/haproxy.cfg
    - -db
    ports:
    - 8080:80
    - 5175:80
    - 14005:8404
    volumes:
    - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
    - lens-network
    depends_on:
    - lens-v2-node-0
    - lens-v2-node-1
    - lens-v2-node-2
    - lens-v2-node-3
    - lens-v2-node-4
    - lens-v2-node-5
    - lens-v2-node-6
    - lens-v2-node-7
    - lens-v2-node-8
    - lens-v2-node-9
    - lens-v2-node-10
    - lens-v2-node-11
    - lens-v2-node-12
    - lens-v2-node-13
    - lens-v2-node-14
    - lens-v2-node-15
    - lens-v2-node-16
    - lens-v2-node-17
    - lens-v2-node-18
    - lens-v2-node-19

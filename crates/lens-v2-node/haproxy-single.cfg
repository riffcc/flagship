global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    timeout tunnel  1h

# Stats page
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s

# Main frontend for all traffic
frontend http_front
    bind *:80

    # ACLs for routing
    acl is_api_request path_beg /api/
    acl is_websocket hdr(Upgrade) -i WebSocket
    acl is_ws_relay path_beg /api/v1/relay/ws

    # Route WebSocket relay to backend nodes (not needed since using external relay)
    use_backend lens_backend_ws if is_ws_relay is_websocket

    # Route API requests to backend nodes
    use_backend lens_backend if is_api_request

    # Route everything else to frontend
    default_backend flagship_frontend

# Backend for lens-v2-node API (Rust) - 3 NODES
backend lens_backend
    balance roundrobin
    option httpchk GET /api/v1/ready
    http-check expect status 200

    # Forward signature headers (don't strip them)
    http-request set-header X-Forwarded-For %[src]
    http-request add-header X-Forwarded-Proto https if { ssl_fc }

    server lens-v2-single-0 lens-v2-single-0:5000 check inter 5s
    server lens-v2-single-1 lens-v2-single-1:5000 check inter 5s
    server lens-v2-single-2 lens-v2-single-2:5000 check inter 5s

# Backend for WebSocket relay (Rust lens-v2-node) - 3 NODES
# Note: These nodes connect to EXTERNAL relay at relay01.eu.riff.cc
# This backend is for local WebSocket proxying only
backend lens_backend_ws
    balance roundrobin
    option httpchk GET /api/v1/ready
    http-check expect status 200
    timeout tunnel 3600s
    timeout server 3600s
    timeout client 3600s

    # Enable WebSocket protocol upgrade
    http-request set-header X-Forwarded-For %[src]
    http-request add-header X-Forwarded-Proto https if { ssl_fc }

    server lens-v2-single-0 lens-v2-single-0:5000 check inter 5s
    server lens-v2-single-1 lens-v2-single-1:5000 check inter 5s
    server lens-v2-single-2 lens-v2-single-2:5000 check inter 5s

# Backend for flagship frontend (Node.js/nginx) - 3 NODES
backend flagship_frontend
    balance roundrobin
    option httpchk GET /
    http-check expect status 200

    server flagship-single-0 flagship-single-0:80 check inter 5s
    server flagship-single-1 flagship-single-1:80 check inter 5s
    server flagship-single-2 flagship-single-2:80 check inter 5s

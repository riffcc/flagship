global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    timeout tunnel  1h

# Stats page
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s

# Main frontend for API traffic
frontend http_front
    bind *:80

    # ACLs for routing
    acl is_websocket hdr(Upgrade) -i WebSocket
    acl is_ws_relay path_beg /api/v1/relay/ws

    # Route WebSocket relay
    use_backend lens_backend_ws if is_ws_relay is_websocket

    # Route all API requests
    default_backend lens_backend

# Backend for lens-v2-node API
backend lens_backend
    balance roundrobin
    option httpchk GET /api/v1/ready
    http-check expect status 200

    server lens-v2-node-0 lens-v2-node-0:5000 check inter 5s
    server lens-v2-node-1 lens-v2-node-1:5000 check inter 5s
    server lens-v2-node-2 lens-v2-node-2:5000 check inter 5s

# Backend for WebSocket relay
backend lens_backend_ws
    balance roundrobin
    option httpchk GET /api/v1/ready
    http-check expect status 200
    timeout tunnel 3600s

    server lens-v2-node-0 lens-v2-node-0:5000 check inter 5s
    server lens-v2-node-1 lens-v2-node-1:5000 check inter 5s
    server lens-v2-node-2 lens-v2-node-2:5000 check inter 5s

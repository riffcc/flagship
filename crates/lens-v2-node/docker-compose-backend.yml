version: '3.8'

services:
  # HAProxy Load Balancer
  haproxy:
    image: haproxy:2.9-alpine
    container_name: lens-haproxy
    ports:
      - "8080:80"        # API traffic
      - "8404:8404"      # Stats page
    volumes:
      - ./haproxy-backend.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - lens-network
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Lens v2 Node 0 (primary relay)
  lens-v2-node-0:
    image: lens-v2-node-lens-v2-node-0:latest
    container_name: lens-v2-node-0
    environment:
      - RUST_LOG=info
      - PORT=5000
      - LENS_NODE_ID=0
      - LENS_CLUSTER_ID=production-cluster
      - DB_PATH=/data/rocksdb
    volumes:
      - lens-v2-node-0-data:/data
    networks:
      - lens-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 3

  # Lens v2 Node 1
  lens-v2-node-1:
    image: lens-v2-node-lens-v2-node-1:latest
    container_name: lens-v2-node-1
    environment:
      - RUST_LOG=info
      - PORT=5000
      - LENS_NODE_ID=1
      - LENS_CLUSTER_ID=production-cluster
      - LENS_RELAY_URL=ws://haproxy:80/api/v1/relay/ws
      - DB_PATH=/data/rocksdb
    volumes:
      - lens-v2-node-1-data:/data
    networks:
      - lens-network
    depends_on:
      haproxy:
        condition: service_healthy
      lens-v2-node-0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 3

  # Lens v2 Node 2
  lens-v2-node-2:
    image: lens-v2-node-lens-v2-node-2:latest
    container_name: lens-v2-node-2
    environment:
      - RUST_LOG=info
      - PORT=5000
      - LENS_NODE_ID=2
      - LENS_CLUSTER_ID=production-cluster
      - LENS_RELAY_URL=ws://haproxy:80/api/v1/relay/ws
      - DB_PATH=/data/rocksdb
    volumes:
      - lens-v2-node-2-data:/data
    networks:
      - lens-network
    depends_on:
      haproxy:
        condition: service_healthy
      lens-v2-node-0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 3

networks:
  lens-network:
    driver: bridge

volumes:
  lens-v2-node-0-data:
  lens-v2-node-1-data:
  lens-v2-node-2-data:

services:
  haproxy:
    image: haproxy:2.3
    container_name: lens-haproxy-single
    entrypoint:
      - /usr/local/sbin/haproxy
    command:
      - -f
      - /usr/local/etc/haproxy/haproxy.cfg
      - -db
    ports:
      - "8080:80"      # HTTP access (same as cluster)
      - "5175:80"      # Alternative HTTP (same as cluster)
      - "14005:8404"   # HAProxy stats (same as cluster)
    volumes:
      - ./haproxy-single.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - lens-single-network
    depends_on:
      - lens-v2-node-0
      - lens-v2-node-1
      - lens-v2-node-2

  # 3 Lens V2 Nodes (using external relay)
  lens-v2-node-0:
    image: zorlin/lens-v2:relay-assisted-claiming
    container_name: lens-v2-single-0
    environment:
      - RUST_LOG=info
      - PORT=5000
      - RELAY_URL=wss://relay01.eu.riff.cc/api/v1/relay/ws
      - ADMIN_PUBLIC_KEY=ed25519p/6efebf50da89a1ba94e0bf56c0728470dd80373149553223da0ce4d8076e9d86,ed25519p/be3dcdf9d0a31a1e45703145f9991ea01b12c0d79633f7e1fc7fe10b66e56473
    volumes:
      - lens-v2-single-0-data:/data
    networks:
      - lens-single-network
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 3

  lens-v2-node-1:
    image: zorlin/lens-v2:relay-assisted-claiming
    container_name: lens-v2-single-1
    environment:
      - RUST_LOG=info
      - PORT=5000
      - RELAY_URL=wss://relay01.eu.riff.cc/api/v1/relay/ws
      - ADMIN_PUBLIC_KEY=ed25519p/6efebf50da89a1ba94e0bf56c0728470dd80373149553223da0ce4d8076e9d86,ed25519p/be3dcdf9d0a31a1e45703145f9991ea01b12c0d79633f7e1fc7fe10b66e56473
    volumes:
      - lens-v2-single-1-data:/data
    networks:
      - lens-single-network
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 3

  lens-v2-node-2:
    image: zorlin/lens-v2:relay-assisted-claiming
    container_name: lens-v2-single-2
    environment:
      - RUST_LOG=info
      - PORT=5000
      - RELAY_URL=wss://relay01.eu.riff.cc/api/v1/relay/ws
      - ADMIN_PUBLIC_KEY=ed25519p/6efebf50da89a1ba94e0bf56c0728470dd80373149553223da0ce4d8076e9d86,ed25519p/be3dcdf9d0a31a1e45703145f9991ea01b12c0d79633f7e1fc7fe10b66e56473
    volumes:
      - lens-v2-single-2-data:/data
    networks:
      - lens-single-network
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 3

  # 3 Flagship Frontend Nodes
  flagship-node-0:
    image: zorlin/flagship-v2:v0.7.6
    container_name: flagship-single-0
    environment:
      - NODE_ENV=production
      - API_URL=https://api.palace.riff.cc/api/v1
      - RELAY_URL=wss://relay01.eu.riff.cc/api/v1/relay/ws
    ports:
      - "15075:80"   # External access to flagship-0 (same as cluster)
    networks:
      - lens-single-network
    privileged: true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  flagship-node-1:
    image: zorlin/flagship-v2:v0.7.6
    container_name: flagship-single-1
    environment:
      - NODE_ENV=production
      - API_URL=https://api.palace.riff.cc/api/v1
      - RELAY_URL=wss://relay01.eu.riff.cc/api/v1/relay/ws
    networks:
      - lens-single-network
    privileged: true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  flagship-node-2:
    image: zorlin/flagship-v2:v0.7.6
    container_name: flagship-single-2
    environment:
      - NODE_ENV=production
      - API_URL=https://api.palace.riff.cc/api/v1
      - RELAY_URL=wss://relay01.eu.riff.cc/api/v1/relay/ws
    networks:
      - lens-single-network
    privileged: true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

networks:
  lens-single-network:
    driver: bridge

volumes:
  lens-v2-single-0-data:
  lens-v2-single-1-data:
  lens-v2-single-2-data:

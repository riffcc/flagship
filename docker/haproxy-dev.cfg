global
    log stdout format raw local0

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend citadel_api
    bind *:8085
    default_backend citadel_nodes

backend citadel_nodes
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server citadel-1 citadel-1:8080 check inter 2s fall 3 rise 2
    server citadel-2 citadel-2:9080 check inter 2s fall 3 rise 2
    server citadel-3 citadel-3:10080 check inter 2s fall 3 rise 2

# Stats page at :8404/stats
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s

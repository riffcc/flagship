server.modules = (
    "mod_accesslog",
    "mod_staticfile",
    "mod_indexfile",
    "mod_rewrite"
)

server.document-root = "/var/www/html"
server.port = 8080
server.username = "flagship"
server.groupname = "flagship"

# Logging
accesslog.filename = "/dev/stdout"
server.errorlog = "/dev/stderr"

# Index file
index-file.names = ("index.html")

# MIME types
mimetype.assign = (
    ".html" => "text/html",
    ".css" => "text/css",
    ".js" => "application/javascript",
    ".json" => "application/json",
    ".png" => "image/png",
    ".jpg" => "image/jpeg",
    ".jpeg" => "image/jpeg",
    ".gif" => "image/gif",
    ".svg" => "image/svg+xml",
    ".ico" => "image/x-icon",
    ".woff" => "font/woff",
    ".woff2" => "font/woff2",
    ".ttf" => "font/ttf",
    ".eot" => "application/vnd.ms-fontobject",
    ".webp" => "image/webp",
    ".webm" => "video/webm",
    ".mp4" => "video/mp4",
    ".mp3" => "audio/mpeg",
    ".wasm" => "application/wasm"
)

# SPA fallback - rewrite all non-file requests to index.html
url.rewrite-if-not-file = (
    "^/(.*)$" => "/index.html"
)

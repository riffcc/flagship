@version: 4.0
@include "scl.conf"

# Global options
options {
    chain_hostnames(off);
    flush_lines(0);
    use_dns(no);
    use_fqdn(no);
    owner("root");
    group("root");
    perm(0640);
    stats_freq(0);
    bad_hostname("^gconfd$");
    time_reopen(10);
    log_fifo_size(10000);
    create_dirs(yes);
};

# TLS configuration
# Generate certs with: ./generate-certs.sh
source s_tls {
    syslog(
        ip(0.0.0.0)
        port(6514)
        transport("tls")
        tls(
            key-file("/etc/syslog-ng/certs/server-key.pem")
            cert-file("/etc/syslog-ng/certs/server-cert.pem")
            ca-dir("/etc/syslog-ng/certs")
            # Peer verification - set to required-trusted for mutual TLS
            peer-verify(optional-untrusted)
        )
        flags(no-parse)
    );
};

# UDP source (for testing, less secure)
source s_udp {
    syslog(
        ip(0.0.0.0)
        port(514)
        transport("udp")
        flags(no-parse)
    );
};

# TCP source (non-TLS, for testing)
source s_tcp {
    syslog(
        ip(0.0.0.0)
        port(601)
        transport("tcp")
        flags(no-parse)
    );
};

# Filter for Bunny.net logs
# Bunny.net should send logs with a specific hostname or identifier
filter f_bunny {
    # Match logs from Bunny.net
    # Option 1: Match by hostname pattern
    host("bunny") or host("bunnycdn") or host("*.bunny.net") or

    # Option 2: Match by a custom field (if Bunny.net supports it)
    # match("BUNNY-CDN-TOKEN" value("MESSAGE")) or

    # Option 3: Match by program name
    program("bunnycdn") or

    # Accept all for now (comment out the filters above if needed)
    match(".*" value("MESSAGE"));
};

# Filter for CDN access logs (typically higher volume)
filter f_cdn_access {
    facility(local0) or
    program("cdn") or
    match("GET|POST|PUT|DELETE|HEAD" value("MESSAGE"));
};

# Filter for CDN errors
filter f_cdn_error {
    facility(local1) or
    level(err..emerg) or
    match("error|ERROR|Error|5[0-9][0-9]" value("MESSAGE"));
};

# Destination: All Bunny.net logs
destination d_bunny_all {
    file(
        "/var/log/remote/bunny/all.log"
        template("$(format-json --scope rfc5424 --scope nv-pairs --exclude DATE --key ISODATE)\n")
        create_dirs(yes)
    );
};

# Destination: CDN access logs (structured)
destination d_bunny_access {
    file(
        "/var/log/remote/bunny/access.log"
        template("$ISODATE $HOST $PROGRAM[$PID]: $MESSAGE\n")
        create_dirs(yes)
    );
};

# Destination: CDN error logs (structured)
destination d_bunny_error {
    file(
        "/var/log/remote/bunny/error.log"
        template("$ISODATE $HOST $PROGRAM[$PID]: $MESSAGE\n")
        create_dirs(yes)
    );
};

# Destination: Raw logs (everything, for debugging)
destination d_raw {
    file(
        "/var/log/remote/raw/all-${YEAR}${MONTH}${DAY}.log"
        template("$ISODATE $HOST $PROGRAM[$PID]: $MESSAGE\n")
        create_dirs(yes)
    );
};

# Destination: Console (for docker logs)
destination d_console {
    file("/dev/stdout" template("$ISODATE [$LEVEL] $HOST $PROGRAM: $MESSAGE\n"));
};

# Log paths
log {
    source(s_tls);
    source(s_udp);
    source(s_tcp);

    # Log everything to console for docker logs
    destination(d_console);

    # Log everything to raw logs
    destination(d_raw);

    # Filter and route Bunny.net logs
    filter(f_bunny);
    destination(d_bunny_all);

    # Separate access and error logs
    filter(f_cdn_access);
    destination(d_bunny_access);

    filter(f_cdn_error);
    destination(d_bunny_error);
};

# Statistics
source s_internal {
    internal();
};

destination d_stats {
    file("/var/log/remote/stats.log" template("$ISODATE $HOST $MESSAGE\n"));
};

log {
    source(s_internal);
    destination(d_stats);
};

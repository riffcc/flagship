version: '3.8'

services:
  syslog-ng:
    image: balabit/syslog-ng:latest
    container_name: syslog-ng
    restart: unless-stopped
    ports:
      # Standard syslog TLS port
      - "6514:6514"
      # Standard syslog UDP (optional, for non-TLS)
      - "514:514/udp"
    volumes:
      - ./syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
      - ./certs:/etc/syslog-ng/certs:ro
      - ./logs:/var/log/remote:rw
      - syslog-data:/var/lib/syslog-ng
    environment:
      - TZ=UTC
    networks:
      - logging

  # Dozzle - Real-time log viewer with web UI
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/logs:ro
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_TAILSIZE=300
      - DOZZLE_FILTER=name=syslog-ng
      # Optional: Set authentication token for Dozzle
      - DOZZLE_USERNAME=admin
      - DOZZLE_PASSWORD=changeme_$(openssl rand -hex 16)
      - DOZZLE_NO_ANALYTICS=true
    networks:
      - logging

  # Simple file-based log viewer (nginx serving log files)
  log-viewer:
    image: nginx:alpine
    container_name: log-viewer
    restart: unless-stopped
    ports:
      - "8889:80"
    volumes:
      - ./logs:/usr/share/nginx/html/logs:ro
      - ./log-viewer-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - logging

volumes:
  syslog-data:

networks:
  logging:
    driver: bridge

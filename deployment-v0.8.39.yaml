apiVersion: apps/v1
kind: Deployment
metadata:
  name: lens-v2-node-v0839
  labels:
    app: lens-v2-node
    version: v0.8.39
spec:
  replicas: 5000
  selector:
    matchLabels:
      app: lens-v2-node
      version: v0.8.39
  template:
    metadata:
      labels:
        app: lens-v2-node
        version: v0.8.39
    spec:
      containers:
      - name: lens-node
        image: zorlin/lens-v2:v0.8.39
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        - name: PORT
          value: "5000"
        - name: DB_PATH
          value: "/data/.lens-node-data"
        - name: RELAY_URL
          value: "wss://relay.global.riff.cc/api/v1/relay/ws"
        - name: ADMIN_PUBLIC_KEY
          value: "ed25519p/b37fb84757d0ed4c111af910717fe4c867d2cbc0d84495ac003789264e913f49,ed25519p/0ba946643f9c44e4a3f024483de56f5d0412a5c5ff58332000795adf902df7bb,ed25519p/4ca9ba8ac59d18a276bafd50a74a2b6ed83bd6d8a0066825b1eb9f98b3bcaa3a"
        volumeMounts:
        - name: data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /api/v1/ready
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: data
        emptyDir: {}
